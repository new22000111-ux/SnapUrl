name: Build Signed APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  setup-signing:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore and save to repository secrets
        uses: actions/github-script@v7
        env:
          GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        with:
          github-token: ${{ secrets.GH_ADMIN_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const crypto = require('crypto');

            const owner = process.env.OWNER;
            const repo = process.env.REPO;
            const token = process.env.GH_ADMIN_TOKEN;

            const alias = 'snapurl';
            const storePass = crypto.randomBytes(24).toString('base64').replace(/[^a-zA-Z0-9]/g, '').slice(0, 24);
            const keyPass = crypto.randomBytes(24).toString('base64').replace(/[^a-zA-Z0-9]/g, '').slice(0, 24);

            execSync(`
              keytool -genkeypair -v \
                -keystore my-release-key.jks \
                -storepass "${storePass}" \
                -keypass "${keyPass}" \
                -alias "${alias}" \
                -keyalg RSA \
                -keysize 2048 \
                -validity 10000 \
                -dname "CN=SnapURL, OU=SnapToolKit, O=SnapToolKit, L=NA, S=NA, C=US"
            `, { stdio: 'inherit', shell: '/bin/bash' });

            const keyBase64 = fs.readFileSync('my-release-key.jks').toString('base64');

            const publicKeyResp = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/secrets/public-key`, {
              headers: {
                'Accept': 'application/vnd.github+json',
                'Authorization': `Bearer ${token}`,
                'X-GitHub-Api-Version': '2022-11-28'
              }
            });

            if (!publicKeyResp.ok) {
              throw new Error(`Failed to get public key: ${publicKeyResp.status} ${await publicKeyResp.text()}`);
            }

            const publicKeyData = await publicKeyResp.json();
            const keyId = publicKeyData.key_id;
            const publicKey = publicKeyData.key;

            const sodium = require('libsodium-wrappers');
            await sodium.ready;

            function encryptSecret(value, publicKey) {
              const binkey = sodium.from_base64(publicKey, sodium.base64_variants.ORIGINAL);
              const binsec = sodium.from_string(value);
              const encBytes = sodium.crypto_box_seal(binsec, binkey);
              return sodium.to_base64(encBytes, sodium.base64_variants.ORIGINAL);
            }

            async function putSecret(name, value) {
              const encrypted_value = encryptSecret(value, publicKey);

              const resp = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/secrets/${name}`, {
                method: 'PUT',
                headers: {
                  'Accept': 'application/vnd.github+json',
                  'Authorization': `Bearer ${token}`,
                  'X-GitHub-Api-Version': '2022-11-28',
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  encrypted_value,
                  key_id: keyId
                })
              });

              if (!resp.ok && resp.status !== 201 && resp.status !== 204) {
                throw new Error(`Failed to save secret ${name}: ${resp.status} ${await resp.text()}`);
              }
            }

            await putSecret('SIGNING_KEY', keyBase64);
            await putSecret('KEY_ALIAS', alias);
            await putSecret('KEY_STORE_PASSWORD', storePass);
            await putSecret('KEY_PASSWORD', keyPass);

            core.notice('Signing secrets created/updated successfully.');

  build:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: SnapURL-signed-APK
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
