name: Bootstrap Signing

on:
  workflow_dispatch:

jobs:
  setup-signing:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          KEY_ALIAS="snapurl"
          KEY_STORE_PASSWORD="$(openssl rand -hex 16)"
          KEY_PASSWORD="$(openssl rand -hex 16)"

          echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
          echo "KEY_STORE_PASSWORD=$KEY_STORE_PASSWORD" >> $GITHUB_ENV
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV

          keytool -genkeypair -v \
            -keystore my-release-key.jks \
            -storepass "$KEY_STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=SnapURL, OU=SnapToolKit, O=SnapToolKit, L=NA, S=NA, C=US"

          base64 -w 0 my-release-key.jks > signing_key_base64.txt

      - name: Save secrets to repository
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          gh secret set SIGNING_KEY < signing_key_base64.txt
          gh secret set KEY_ALIAS --body "$KEY_ALIAS"
          gh secret set KEY_STORE_PASSWORD --body "$KEY_STORE_PASSWORD"
          gh secret set KEY_PASSWORD --body "$KEY_PASSWORD"

      - name: Verify secrets exist
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          gh secret list
