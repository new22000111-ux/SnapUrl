name: Build APK  
  
on:  
  push:  
    branches: [ main ]  
  workflow_dispatch:  
  
jobs:  
  build:  
    runs-on: ubuntu-latest  
  
    steps:  
      - uses: actions/checkout@v3  
  
      - name: Set up JDK 11  
        uses: actions/setup-java@v3  
        with:  
          java-version: '11'  
          distribution: 'temurin'  
  
      - name: Setup Gradle  
        uses: gradle/gradle-build-action@v2  
        with:  
          gradle-version: '7.5'  
  
      - name: Build Debug APK  
        run: gradle assembleDebug  
  
      - name: Upload APK  
        uses: actions/upload-artifact@v4  
        with:  
          name: SnapURL-APK  
          path: app/build/outputs/apk/debug/SnapURL.apk
